version: 2

models:
  - name: dim_year
    description: "One row per survey vintage. Maps survey_year integer to human-readable label."
    columns:
      - name: survey_year
        description: "End year of the school year (e.g. 2022 for 2021-22). Primary key."
        tests:
          - unique
          - not_null
  - name: dim_district                                                              
    description: "One row per district per survey vintage. Source: LEA
    Characteristics files."                                                             
    columns:
      - name: lea_id                                                                
        description: "LEA identifier. Composite PK with survey_year."               
        tests:
          - not_null                                                                
      - name: survey_year
        description: "Survey end year. Composite PK with lea_id."                   
        tests:
          - not_null                                                                
          - accepted_values:
              arguments:
                values: [2018, 2021, 2022]
      - name: lea_name                                                              
        description: "Name of the district."
        tests:                                                                      
          - not_null
      - name: total_enrollment
        description: "Overall student enrollment in the LEA."
  - name: dim_school
    description: "One row per school per survey vintage. Source: SCH Characteristics files."                                    
    columns:                                                                        
      - name: combokey
        description: "School combo key (LEA ID + school ID). Composite PK with
        survey_year."                               
        tests:                                                                      
          - not_null                                                                
      - name: survey_year                                                           
        description: "Survey end year. Composite PK with combokey."                 
        tests:                                                                      
          - not_null                    
          - accepted_values:
              arguments:
                values: [2018, 2021, 2022]
      - name: school_name
        description: "Name of the school."
        tests:
          - not_null
      - name: lea_id
        description: "FK to dim_district."
        tests:
          - not_null
  - name: fct_enrollment_k12
    description: "K-12 enrollment by school, survey year, subgroup, and sex. Unpivoted from wide CRDC enrollment files."                                         
    columns:
      - name: combokey
        description: "FK to dim_school."
        tests:
          - not_null
      - name: lea_id
        description: "FK to dim_district."
        tests:
          - not_null
      - name: survey_year
        description: "FK to dim_year."
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: [2018, 2021, 2022]
      - name: subgroup
        description: "Race/ethnicity group or special population."
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['hispanic', 'american_indian', 'asian', 'hawaiian_pacific_islander', 'black', 'white', 'two_or_more_races', 'total', 'english_learner', 'idea', 'section_504']
      - name: sex
        description: "Sex category."
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['male', 'female', 'nonbinary']
  - name: fct_enrollment_ps                                                         
    description: "Preschool enrollment by school, survey year, subgroup, and sex. Unpivoted from wide CRDC enrollment files."                                         
    columns:                            
      - name: combokey                                                              
        description: "FK to dim_school."                                            
        tests:                                                                      
          - not_null                                                                
      - name: lea_id                                                                
        description: "FK to dim_district."
        tests:                                                                      
          - not_null                                                                
      - name: survey_year
        description: "FK to dim_year."                                              
        tests:                              
          - not_null                    
          - accepted_values:
              arguments:                                                            
                values: [2018, 2021, 2022]
      - name: subgroup                                                              
        description: "Race/ethnicity group or special population."
        tests:                              
          - not_null                                                                
          - accepted_values:
              arguments:                                                            
                values: ['hispanic', 'american_indian', 'asian', 'hawaiian_pacific_islander', 'black', 'white', 'two_or_more_races', 'total', 'english_learner', 'idea', 'section_504']
      - name: sex
        description: "Sex category."                                                
        tests:
          - not_null                                                                
          - accepted_values:
              arguments:
                values: ['male', 'female']
  - name: fct_enrollment_k12_programs                                               
    description: "K-12 program enrollment by school, survey year, program, subgroup, and sex. Programs: el, el_program, idea, section_504."                             
    columns:                                                                        
      - name: combokey
        description: "FK to dim_school."                                            
        tests:                              
          - not_null                                                                
      - name: lea_id
        description: "FK to dim_district."                                          
        tests:                              
          - not_null                                                                
      - name: survey_year
        description: "FK to dim_year."                                              
        tests:
          - not_null                                                                
          - accepted_values:
              arguments:                    
                values: [2018, 2021, 2022]
      - name: program
        description: "Program type."                                                
        tests:                              
          - not_null                                                                
          - accepted_values:
              arguments:                                                            
                values: ['el', 'el_program', 'idea', 'section_504']
      - name: subgroup                                                              
        description: "Race/ethnicity group or special population."
        tests:
          - not_null                                                                
          - accepted_values:                
              arguments:                                                            
                values: ['hispanic', 'american_indian', 'asian', 'hawaiian_pacific_islander', 'black', 'white', 'two_or_more_races', 'total', 'english_learner', 'idea']              
      - name: sex                                                                   
        description: "Sex category."                                                
        tests:
          - not_null                                                                
          - accepted_values:
              arguments:
                values: ['male', 'female', 'nonbinary']
  - name: fct_enrollment_ps_programs                                                
    description: "Preschool program enrollment by school, subgroup, and sex. 2022-only; programs el, el_program, idea, section_504 were new required items that year."                                                                              
    columns:                                                                        
      - name: combokey                                                              
        description: "FK to dim_school."
        tests:                                                                      
          - not_null                    
      - name: lea_id
        description: "FK to dim_district."                                          
        tests:
          - not_null                                                                
      - name: survey_year                   
        description: "FK to dim_year. 2022 only."
        tests:
          - not_null                                                                
          - accepted_values:                
              arguments:                                                            
                values: [2022]
      - name: program                                                               
        description: "Program type."
        tests:                                                                      
          - not_null                    
          - accepted_values:
              arguments:                                                            
                values: ['el', 'el_program', 'idea', 'section_504']
      - name: subgroup                                                              
        description: "Race/ethnicity group or special population."
        tests:                          
          - not_null
          - accepted_values:                                                        
              arguments:                    
                values: ['hispanic', 'american_indian', 'asian', 'hawaiian_pacific_islander', 'black', 'white', 'two_or_more_races', 'total', 'english_learner']                                                                  
      - name: sex
        description: "Sex category."                                                
        tests:  
          - not_null                                                                
          - accepted_values:
              arguments:
                values: ['male', 'female']
  - name: fct_internet                                                              
    description: "School-level internet access and device indicators. 2021 and 2022 only; not collected in 2018."                                                       
    columns:                                                                        
      - name: combokey
        description: "FK to dim_school."
        tests:
          - not_null
      - name: lea_id
        description: "FK to dim_district."
        tests:
         - not_null
      - name: survey_year
        description: "FK to dim_year."
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: [2021, 2022]
  - name: dim_school_context
    description: "CCD school characteristics joined to CRDC schools via crosswalk.
    One row per school per vintage. 2018 rows have NULL for all CCD columns (no crosswalk).
    ~1-2% of 2021/2022 rows are NULL (unmatched in crosswalk)."
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - combokey
              - survey_year
    columns:
      - name: combokey
        description: "Composite PK with survey_year. FK to dim_school."
        tests:
          - not_null
      - name: survey_year
        description: "Composite PK with combokey. FK to dim_year."
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: [2018, 2021, 2022]
      - name: locale_type
        description: "Urbanicity classification from CCD. NULL for 2018 and unmatched schools."
        tests:
          - accepted_values:
              arguments:
                values: ['city', 'suburb', 'town', 'rural']